<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatch Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    padding: 1.5rem 1rem;
    color: #1a1a1a;
  }

  .container { max-width: 640px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  .header-left h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.3px;
  }

  .board-id {
    font-size: 12px;
    color: #888;
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-ghost {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
    color: #555;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-ghost:hover { background: #f0efeb; }

  .sync-indicator {
    font-size: 12px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ccc;
  }
  .sync-dot.syncing { background: #f0a500; animation: pulse 1s infinite; }
  .sync-dot.synced { background: #22a06b; }
  .sync-dot.error { background: #e53e3e; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .board {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e8e6e0;
    overflow: hidden;
  }

  .board-row {
    display: grid;
    grid-template-columns: 90px 1fr 100px;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid #f0eeea;
  }
  .board-row:last-child { border-bottom: none; }

  .truck-num {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .status-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1.5px solid;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.1s, opacity 0.1s;
    width: 100%;
    text-align: left;
  }
  .status-btn:active { transform: scale(0.97); }

  .status-inner { display: flex; align-items: center; gap: 7px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .chevron { font-size: 11px; opacity: 0.5; }

  .timestamp {
    font-size: 11px;
    color: #aaa;
    text-align: right;
    white-space: nowrap;
  }



  .offline-banner {
    display: none;
    background: #fff8e1;
    border: 1px solid #f0c040;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: #7a5c00;
    margin-bottom: 1rem;
  }
  .offline-banner.show { display: block; }

  @media (max-width: 480px) {
    .board-row { grid-template-columns: 70px 1fr 80px; gap: 8px; padding: 10px 12px; }
    .footer { padding: 0.875rem 1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="offline-banner" id="offline-banner">
    ⚠️ Working offline — changes saved locally and will sync when reconnected.
  </div>

  <div class="header">
    <div class="header-left">
      <h1>Dispatch board</h1>
      <div class="board-id" id="board-id-label"></div>
    </div>
    <div class="header-right">
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">—</span>
      </div>
      <button class="btn-ghost" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>

  <div class="board" id="board"></div>



</div>
<script>
const STATUSES = [
  { label: 'Not started', color: '#aaa',    border: '#ddd',    bg: '#fafafa'  },
  { label: 'In route',    color: '#1a6fc4', border: '#85b7eb', bg: '#e6f1fb'  },
  { label: 'On site',     color: '#a05c00', border: '#ef9f27', bg: '#faeeda'  },
  { label: 'Dispatched',  color: '#0f7a5a', border: '#5dcaa5', bg: '#e1f5ee'  },
  { label: 'Done',        color: '#3d6b10', border: '#97c459', bg: '#eaf3de'  },
];

const TRUCKS = 10;

function getBoardId() {
  const params = new URLSearchParams(window.location.search);
  const date = params.get('date');
  const client = params.get('client');
  if (date && client) return `${date}--${client}`;
  if (date) return date;
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function getBoardLabel() {
  const params = new URLSearchParams(window.location.search);
  const date = params.get('date');
  const client = params.get('client');
  if (date && client) return `${date} · ${client}`;
  if (date) return date;
  return new Date().toISOString().slice(0,10);
}

const boardId = getBoardId();
const KV_URL = 'ispatch-board.dholmes127.workers.dev'; // replace after deploying worker

let state = [];
let syncTimeout = null;

function defaultState() {
  return Array.from({length: TRUCKS}, (_, i) => ({
    truck: i + 1,
    statusIndex: 0,
    updatedAt: null
  }));
}

function setSyncStatus(status, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label;
}

async function loadFromKV() {
  try {
    const res = await fetch(`${KV_URL}?board=${encodeURIComponent(boardId)}`);
    if (res.ok) {
      const data = await res.json();
      if (data && Array.isArray(data)) {
        state = data;
        setSyncStatus('synced', 'Live');
        return;
      }
    }
  } catch(e) {}
  const local = localStorage.getItem('dispatch-' + boardId);
  state = local ? JSON.parse(local) : defaultState();
  setSyncStatus('error', 'Offline');
  document.getElementById('offline-banner').classList.add('show');
}

async function saveToKV() {
  localStorage.setItem('dispatch-' + boardId, JSON.stringify(state));
  setSyncStatus('syncing', 'Saving…');
  try {
    const res = await fetch(`${KV_URL}?board=${encodeURIComponent(boardId)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    if (res.ok) {
      setSyncStatus('synced', 'Saved');
      document.getElementById('offline-banner').classList.remove('show');
    } else {
      setSyncStatus('error', 'Offline');
    }
  } catch(e) {
    setSyncStatus('error', 'Offline');
    document.getElementById('offline-banner').classList.add('show');
  }
}

function scheduleSave() {
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(saveToKV, 600);
}

function formatTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function render() {
  document.getElementById('board-id-label').textContent = getBoardLabel();



  const board = document.getElementById('board');
  board.innerHTML = '';

  state.forEach((t, i) => {
    const s = STATUSES[t.statusIndex];
    const row = document.createElement('div');
    row.className = 'board-row';
    row.innerHTML = `
      <div class="truck-num">Truck ${t.truck}</div>
      <button class="status-btn"
        style="color:${s.color}; border-color:${s.border}; background:${s.bg};"
        onclick="cycleStatus(${i})"
        aria-label="Truck ${t.truck} status: ${s.label}. Tap to change.">
        <span class="status-inner">
          <span class="status-dot" style="background:${s.color};"></span>
          ${s.label}
        </span>
        <span class="chevron">›</span>
      </button>
      <div class="timestamp">${formatTime(t.updatedAt)}</div>
    `;
    board.appendChild(row);
  });
}

function cycleStatus(i) {
  state[i].statusIndex = (state[i].statusIndex + 1) % STATUSES.length;
  state[i].updatedAt = Date.now();
  render();
  scheduleSave();
}

function resetAll() {
  if (!confirm('Reset all trucks to "Not started"?')) return;
  state = defaultState();
  render();
  scheduleSave();
}



loadFromKV().then(render);

setInterval(async () => {
  try {
    const res = await fetch(`${KV_URL}?board=${encodeURIComponent(boardId)}`);
    if (res.ok) {
      const data = await res.json();
      if (data && Array.isArray(data)) {
        state = data;
        render();
        setSyncStatus('synced', 'Live');
      }
    }
  } catch(e) {}
}, 10000);
</script>
</body>
</html>
